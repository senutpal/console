name: Hive Interactive

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  post-directions:
    if: |
      (github.event_name == 'issues' && github.event.issue.user.type != 'Bot') ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    steps:
      - name: Post hive interaction directions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const item = context.eventName === 'issues'
              ? context.payload.issue
              : context.payload.pull_request;

            const body = [
              `🐝 Hi @${item.user.login}! I'm \`kubestellar-hive[bot]\`, an AI assistant for this repo.`,
              '',
              'Trusted users can mention `@kubestellar-hive` in a comment to interact with me.',
              'I can help with code reviews, bug fixes, CI/CD help, and questions about the codebase.',
              '',
              '_I’m AI-powered, so replies may take a moment._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: item.number,
              body,
            });

  trust-gate:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@kubestellar-hive')
    uses: ./.github/workflows/hive-trust-gate.yml
    permissions:
      contents: read
      issues: write
    with:
      actor: ${{ github.event.comment.user.login }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      default-branch: ${{ github.event.repository.default_branch }}
      issue-number: ${{ github.event.issue.number }}
      comment-url: ${{ github.event.comment.html_url }}

  hive-mention:
    needs: trust-gate
    if: |
      github.event_name == 'issue_comment' &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@kubestellar-hive') &&
      needs.trust-gate.outputs.is-trusted == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: hive-interactive-${{ github.event.issue.number }}-${{ github.event.comment.id }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Evaluate mention
        id: evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          IS_PULL_REQUEST: ${{ github.event.issue.pull_request != null }}
        run: |
          set -euo pipefail

          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -X POST \
            -f content='eyes' >/dev/null

          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null || true)

          TRIAGED=false
          if printf '%s\n' "$LABELS" | grep -Fxq 'triage/accepted'; then
            TRIAGED=true
          fi

          ACTIVE_RUN=false
          if printf '%s\n' "$LABELS" | grep -Eq '^(ai-processing|ai-awaiting-fix|ai-pr-draft|ai-pr-ready)$'; then
            ACTIVE_RUN=true
          fi

          CLEAN_BODY=$(python3 -c 'import os,re; text=os.environ["COMMENT_BODY"]; text=re.sub(r"@kubestellar-hive\\b", "", text, flags=re.IGNORECASE).strip(); print(text or "No additional instruction provided.")')

          echo "triaged=$TRIAGED" >> "$GITHUB_OUTPUT"
          echo "active_run=$ACTIVE_RUN" >> "$GITHUB_OUTPUT"
          echo "is_pull_request=$IS_PULL_REQUEST" >> "$GITHUB_OUTPUT"
          DELIMITER="EOF_$(openssl rand -hex 8)"
          {
            echo "clean_body<<${DELIMITER}"
            printf '%s\n' "$CLEAN_BODY"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure hive labels are present
        if: |
          steps.evaluate.outputs.is_pull_request != 'true' &&
          steps.evaluate.outputs.triaged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          gh label create "ai-fix-requested" --repo "$REPO" --color "d4c5f9" \
            --description "AI fix has been requested" 2>/dev/null || true

          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "ai-fix-requested"

      - name: Dispatch hive fix workflow
        if: |
          steps.evaluate.outputs.is_pull_request != 'true' &&
          steps.evaluate.outputs.triaged == 'true' &&
          steps.evaluate.outputs.active_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          gh api "repos/$REPO/actions/workflows/implement-fix.lock.yml/dispatches" \
            -X POST \
            -f ref="$DEFAULT_BRANCH" \
            -f inputs[issue_number]="$ISSUE_NUMBER"

      - name: Acknowledge mention
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          CLEAN_BODY: ${{ steps.evaluate.outputs.clean_body }}
          TRIAGED: ${{ steps.evaluate.outputs.triaged }}
          ACTIVE_RUN: ${{ steps.evaluate.outputs.active_run }}
          IS_PULL_REQUEST: ${{ steps.evaluate.outputs.is_pull_request }}
        run: |
          set -euo pipefail

          QUOTED_BODY=$(printf '%s\n' "$CLEAN_BODY" | sed 's/^/> /')

          if [ "$IS_PULL_REQUEST" = 'true' ]; then
            if [ "$ACTIVE_RUN" = 'true' ]; then
              STATUS_LINE='I saved your instruction on this PR thread. There is already AI automation active for this PR, so I did not start anything new.'
              NEXT_STEP='The active automation can use this new context on its next pass.'
            else
              STATUS_LINE='I saved your instruction on this PR thread.'
              NEXT_STEP='Mention `@kubestellar-hive` again any time with more details, follow-up questions, or review requests.'
            fi
          elif [ "$TRIAGED" != 'true' ]; then
            STATUS_LINE='I saved your instruction, but I did not queue a hive run because this issue is not labeled `triage/accepted` yet.'
            NEXT_STEP='Once a maintainer accepts the issue, mention the hive again (or use `/triage accepted`) to kick off the workflow.'
          elif [ "$ACTIVE_RUN" = 'true' ]; then
            STATUS_LINE='I saved your instruction on the issue thread. This issue already has an active hive run, so I did not start a duplicate workflow.'
            NEXT_STEP='The existing automation can use this new context on its next pass.'
          else
            STATUS_LINE='I saved your instruction and queued the hive fix workflow for this issue.'
            NEXT_STEP='The queued run will use the issue thread, including your mention comment, as additional context.'
          fi

          BODY=$(printf '## 🐝 Hive mention received\n\nThanks @%s — I captured the instruction from [your comment](%s).\n\n%s\n\n%s\n\n### Instruction captured\n%s\n' "$COMMENT_AUTHOR" "$COMMENT_URL" "$STATUS_LINE" "$NEXT_STEP" "$QUOTED_BODY")

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY"
