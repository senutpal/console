name: Copilot PR Automation

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to process
        required: true
        type: string
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: copilot-automation-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.sha }}
  cancel-in-progress: true

jobs:
  copilot-automation:
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: kubestellar/infra/.github/workflows/reusable-copilot-automation.yml@5c7fdcdde035388fa2df43d860d2372c2dd3e3ed  # main
    with:
      pr_number: ${{ github.event.inputs.pr_number || '' }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
