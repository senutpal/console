name: OpenSSF Scorecard

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read
  id-token: write

jobs:
  analysis:
    uses: kubestellar/infra/.github/workflows/reusable-scorecard.yml@5c7fdcdde035388fa2df43d860d2372c2dd3e3ed  # main
    timeout-minutes: 5
    secrets: inherit
