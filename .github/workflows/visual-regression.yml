name: Visual Regression

on:
  pull_request:
    paths:
      - 'web/src/**'
      - 'web/e2e/visual/**'
      - '.github/workflows/visual-regression.yml'
  workflow_dispatch:

# Least-privilege: read-only by default
permissions: read-all

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Full-app visual regression (layout, pages, routes) ───────────────
  app-visual-regression:
    name: App Visual Regression
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check for existing baselines
        id: app-baselines
        run: |
          if ls e2e/visual/app-*-snapshots/chromium/*.png 1>/dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Start preview server
        run: |
          npm run preview &
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Generate baseline screenshots (first run)
        if: steps.app-baselines.outputs.exist == 'false'
        run: npm run test:visual:update
        env:
          CI: 'true'
          APP_VISUAL_BASE_URL: http://localhost:4173

      - name: Run app visual regression tests
        if: steps.app-baselines.outputs.exist == 'true'
        run: npm run test:visual
        env:
          CI: 'true'
          APP_VISUAL_BASE_URL: http://localhost:4173

      - name: Upload baseline screenshots (first run)
        if: steps.app-baselines.outputs.exist == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-visual-baselines
          path: web/e2e/visual/app-visual-regression.spec.ts-snapshots/
          retention-days: 30

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-visual-diff
          path: |
            web/test-results/app-visual/
            web/app-visual-report/
          retention-days: 14

  # ── Storybook component visual regression ────────────────────────────
  storybook-visual-regression:
    name: Storybook Visual Regression
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook

      - name: Check for existing baselines
        id: baselines
        run: |
          if ls e2e/visual/visual-regression.spec.ts-snapshots/*.png 1>/dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate baseline screenshots (first run)
        if: steps.baselines.outputs.exist == 'false'
        run: npx playwright test --config e2e/visual/visual.config.ts --update-snapshots

      - name: Run visual regression tests
        if: steps.baselines.outputs.exist == 'true'
        run: npx playwright test --config e2e/visual/visual.config.ts

      - name: Upload baseline screenshots
        if: steps.baselines.outputs.exist == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-baselines
          path: web/e2e/visual/visual-regression.spec.ts-snapshots/
          retention-days: 30

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-report
          path: web/e2e/visual-report/
          retention-days: 14

      - name: Upload updated snapshots
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-snapshots
          path: web/e2e/visual/**/*-snapshots/
          retention-days: 14
