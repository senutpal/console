name: Open Issue on Workflow Failure

on:
  workflow_run:
    workflows:
      # Release pipeline
      - "Release"
      - "Build and Deploy KC"
      # Nightly health checks
      - "Nightly Compliance & Perf"
      - "Nightly Test Suite"
      - "Nightly Dashboard Health"
      - "Nightly gh-aw Version Check"
      - "Playwright Cross-Browser (Nightly)"
      - "Card Loading Standard"
      - "Startup Smoke Tests"
      # Scheduled quality gates
      - "Auto-QA Agent"
      - "Auto-QA Tuner"
      - "Nil Safety"
      - "GA4 Error Monitor"
      # Weekly reviews
      - "OpenSSF Scorecard"
      - "Weekly Coverage Review"
    types:
      - completed

permissions:
  issues: write
  actions: read

jobs:
  open-issue:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event == 'schedule' ||
       github.event.workflow_run.event == 'workflow_dispatch' ||
       (github.event.workflow_run.name == 'Build and Deploy KC' &&
        github.event.workflow_run.head_branch == 'main'))
    steps:
      - name: Check for existing open issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          LABEL="workflow-failure"
          SEARCH_TITLE="Workflow failure: ${WORKFLOW_NAME}"
          export SEARCH_TITLE

          # Search for an existing open issue with matching title and label
          EXISTING=$(gh issue list \
            --repo "$REPOSITORY" \
            --state open \
            --label "$LABEL" \
            --search "in:title \"${SEARCH_TITLE}\"" \
            --json number,title \
            --jq '.[] | select(.title == env.SEARCH_TITLE) | .number' \
          )

          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "Found existing issue #${EXISTING}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch failed jobs for comment
        if: steps.check.outputs.exists == 'true'
        id: comment-details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          FAILED_JOBS=$(gh run view "$RUN_ID" \
            --repo "$REPOSITORY" \
            --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "")
          echo "failed_jobs=${FAILED_JOBS}" >> "$GITHUB_OUTPUT"

      - name: Comment on existing issue
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.check.outputs.issue_number }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          FAILED_JOBS: ${{ steps.comment-details.outputs.failed_jobs }}
        run: |
          BODY_FILE="$GITHUB_WORKSPACE/workflow-failure-comment.md"
          {
            printf '**Still failing** — `%s` failed again.\n\n' "$WORKFLOW_NAME"
            printf -- '- **Run:** [#%s](%s)\n' "$RUN_ID" "$RUN_URL"
            printf -- '- **Time:** %s\n' "$(date -u '+%Y-%m-%d %H:%M UTC')"
            if [ -n "$FAILED_JOBS" ]; then
              printf -- '- **Failed jobs:** `%s`\n' "$FAILED_JOBS"
            fi
          } > "$BODY_FILE"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --body-file "$BODY_FILE"

          rm -f "$BODY_FILE"

      - name: Ensure label exists
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh label create "workflow-failure" \
            --repo "$REPOSITORY" \
            --description "Automated: scheduled workflow failed" \
            --color "d93f0b" \
            2>/dev/null || true

      - name: Fetch failed job details
        if: steps.check.outputs.exists == 'false'
        id: details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          FAILED_JOBS=$(gh run view "$RUN_ID" \
            --repo "$REPOSITORY" \
            --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "")
          echo "failed_jobs=${FAILED_JOBS}" >> "$GITHUB_OUTPUT"

      - name: Open new issue
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_FILE: ${{ github.event.workflow_run.path }}
          FAILED_JOBS: ${{ steps.details.outputs.failed_jobs }}
        run: |
          BODY_FILE="$GITHUB_WORKSPACE/workflow-failure-issue.md"
          TITLE="Workflow failure: ${WORKFLOW_NAME}"

          {
            printf '## Workflow Failure\n\n'
            printf 'The **%s** workflow failed.\n\n' "$WORKFLOW_NAME"
            printf '| Detail | Value |\n'
            printf '|--------|-------|\n'
            printf '| **Workflow** | `%s` |\n' "$WORKFLOW_NAME"
            printf '| **Run** | [#%s](%s) |\n' "$RUN_ID" "$RUN_URL"
            printf '| **File** | `%s` |\n' "$WORKFLOW_FILE"
            printf '| **Time** | %s |\n' "$(date -u '+%Y-%m-%d %H:%M UTC')"
            if [ -n "$FAILED_JOBS" ]; then
              printf '| **Failed jobs** | `%s` |\n' "$FAILED_JOBS"
            fi
            printf '\n### Next Steps\n'
            printf '1. Check the [failed run](%s) for error details\n' "$RUN_URL"
            printf '2. Fix the underlying issue\n'
            printf '3. **Do not close** this issue until the workflow passes on `main`\n\n'
            printf -- '---\n'
            printf '*This issue was automatically created by the workflow failure monitor.*\n'
          } > "$BODY_FILE"

          gh issue create \
            --repo "$REPOSITORY" \
            --title "$TITLE" \
            --label "workflow-failure,bug" \
            --body-file "$BODY_FILE"

          rm -f "$BODY_FILE"
