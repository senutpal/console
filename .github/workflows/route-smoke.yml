name: Route & Modal Smoke Test

on:
  schedule:
    # Run hourly to catch regressions early
    - cron: '0 * * * *'
  pull_request:
    paths:
      - 'web/src/components/**'
      - 'web/src/pages/**'
      - 'web/src/App.tsx'
      - 'web/src/config/routes.ts'
      - 'web/src/lib/modals/**'
      - 'web/src/test/route-smoke.test.ts'
  workflow_dispatch:

# Least-privilege: read-only by default
permissions: read-all

jobs:
  route-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Run route & modal smoke tests
        run: npx vitest run src/test/route-smoke.test.ts
