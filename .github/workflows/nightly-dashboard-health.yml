name: Nightly Dashboard Health

# Runs every night at 4:30 UTC (11:30 PM EST).
# Tests all 30+ dashboard routes in demo mode for:
#   - Console errors / unhandled exceptions
#   - Card rendering (not blank pages)
#   - Demo mode indicators
#
# On failure, creates a GitHub issue with diagnostics and assigns to Copilot.

on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:
    inputs:
      skip_issue_creation:
        description: 'Skip creating issues for failures'
        required: false
        default: false
        type: boolean

env:
  CI: true
  NODE_VERSION: '22'

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-dashboard-health
  cancel-in-progress: true

jobs:
  # ── Auth contract smoke test ──────────────────────────────────────
  # Verifies /auth/refresh returns the "token" and "onboarded" fields
  # that AuthCallback.tsx depends on. Catches regressions like commit
  # 25e464fa which removed the token field and broke login for 24h.
  auth-contract:
    if: github.repository == 'kubestellar/console'
    name: Auth Login Contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build backend
        run: go build -o console-bin ./cmd/console

      - name: Test /auth/refresh contract
        run: |
          JWT_SECRET="nightly-smoke-$(openssl rand -hex 16)" \
          DEV_MODE=true BACKEND_PORT=8081 ./console-bin &
          PID=$!
          # Poll /auth/github (dev-mode login) until it returns a 307 with a
          # kc_auth cookie. In dev mode (no GITHUB_CLIENT_ID), GitHubLogin
          # delegates to devModeLogin which sets the JWT in an HttpOnly cookie
          # and redirects to the frontend callback URL (#6590, #4278).
          #
          # Previous versions called /auth/dev-login (non-existent route that
          # fell through to the SPA catch-all 307) and expected a JSON body
          # with a "token" field. Both assumptions were stale: the route was
          # never registered, and the token has been cookie-only since #6590.
          #
          # Retry budget: MAX_TRIES * (CURL_MAX_TIME + SLEEP_SECONDS) = worst case.
          # 10 * (2 + 1) = 30s total, matching the original intent.
          MAX_TRIES=10         # number of poll attempts
          CURL_MAX_TIME=2      # seconds per curl attempt
          SLEEP_SECONDS=1      # seconds between attempts
          MAX_RESP_CHARS=200   # chars of last response to echo in error message
          COOKIE_JAR=/tmp/auth-cookies.txt
          TOKEN=""
          LAST_STATUS=""
          for i in $(seq 1 "$MAX_TRIES"); do
            # Use -c (cookie jar) to capture Set-Cookie headers, and avoid
            # following the redirect so we can inspect the 307 response.
            LAST_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              --max-time "$CURL_MAX_TIME" \
              -c "$COOKIE_JAR" \
              http://localhost:8081/auth/github 2>/dev/null || echo "000")
            # Extract the kc_auth cookie value from the Netscape cookie jar.
            if [ -f "$COOKIE_JAR" ]; then
              TOKEN=$(grep 'kc_auth' "$COOKIE_JAR" | awk '{print $NF}' || true)
              if [ -n "$TOKEN" ]; then break; fi
            fi
            sleep "$SLEEP_SECONDS"
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::Could not get dev-user token after ${MAX_TRIES} tries (~30s) (last HTTP status: ${LAST_STATUS})"
            kill $PID 2>/dev/null; exit 1
          fi
          echo "Dev-mode login OK — got kc_auth cookie (HTTP ${LAST_STATUS})"

          # Test /auth/refresh contract (#6590):
          # - Token is sent via Authorization header (primary) AND cookie (fallback)
          # - Response body must contain "refreshed" and "onboarded" (NOT "token")
          # - New JWT is delivered exclusively via the HttpOnly kc_auth cookie
          REFRESH_RESP=$(curl -sS --max-time 5 -X POST \
            -H "Cookie: kc_auth=$TOKEN" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Requested-With: XMLHttpRequest" \
            http://localhost:8081/auth/refresh)
          HAS_REFRESHED=$(echo "$REFRESH_RESP" | jq -r '.refreshed // empty')
          if [ "$HAS_REFRESHED" != "true" ]; then
            echo "::error::CONTRACT VIOLATION: /auth/refresh missing 'refreshed' field — response: ${REFRESH_RESP:0:$MAX_RESP_CHARS}"
            kill $PID 2>/dev/null; exit 1
          fi
          HAS_ONBOARDED=$(echo "$REFRESH_RESP" | jq 'has("onboarded")')
          if [ "$HAS_ONBOARDED" != "true" ]; then
            echo "::error::CONTRACT VIOLATION: /auth/refresh missing 'onboarded'"
            kill $PID 2>/dev/null; exit 1
          fi
          # Verify token is NOT in the body (#6590 security invariant)
          BODY_TOKEN=$(echo "$REFRESH_RESP" | jq -r '.token // empty')
          if [ -n "$BODY_TOKEN" ]; then
            echo "::error::CONTRACT VIOLATION (#6590): /auth/refresh must NOT return 'token' in body — JWT is HttpOnly cookie-only"
            kill $PID 2>/dev/null; exit 1
          fi
          echo "Auth contract OK"
          kill $PID 2>/dev/null || true

  # ── Dashboard health checks ──────────────────────────────────────
  health-check:
    if: github.repository == 'kubestellar/console'
    name: Dashboard Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run dashboard health tests
        id: tests
        run: |
          set +e
          npx playwright test \
            e2e/nightly/dashboard-health.spec.ts \
            e2e/nightly/mission-deeplink.spec.ts \
            -c e2e/nightly/nightly.config.ts \
            --reporter=list,json 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=$?
          echo "exit_code=$TEST_EXIT" >> "$GITHUB_OUTPUT"

          # Extract the JSON report from test output
          if grep -q '__NIGHTLY_REPORT_JSON__' /tmp/test-output.txt; then
            sed -n '/__NIGHTLY_REPORT_JSON__/,/__NIGHTLY_REPORT_JSON_END__/p' /tmp/test-output.txt \
              | grep -v '__NIGHTLY_REPORT_JSON' > /tmp/nightly-report.json
            echo "has_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_report=false" >> "$GITHUB_OUTPUT"
          fi

          exit $TEST_EXIT
        env:
          PLAYWRIGHT_BASE_URL: ''

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dashboard-results
          path: |
            web/test-results/nightly-dashboard-results.json
            web/nightly-report/
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-screenshots
          path: web/test-results/nightly/
          retention-days: 7

      # ── Issue Creation ──────────────────────────────────────────────

      - name: Create issue for failures
        if: failure() && inputs.skip_issue_creation != true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.CONSOLE_AUTO || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString().split('T')[0];

            // Parse the JSON report if available
            let report = null;
            try {
              const raw = fs.readFileSync('/tmp/nightly-report.json', 'utf8');
              report = JSON.parse(raw);
            } catch {
              core.warning('Could not parse nightly report JSON');
            }

            // Build the issue body
            let failedDashboards = [];
            let warnedDashboards = [];
            let details = '';

            if (report) {
              failedDashboards = (report.results || []).filter(r => r.status === 'fail');
              warnedDashboards = (report.results || []).filter(r => r.status === 'warn');

              details += `## Results\n\n`;
              details += `| Dashboard | Status | Cards | Loaded | Demo | Errors | Details |\n`;
              details += `|-----------|--------|-------|--------|------|--------|---------|\n`;

              for (const r of (report.results || [])) {
                const icon = r.status === 'pass' ? '✅' : r.status === 'warn' ? '⚠️' : '❌';
                details += `| ${r.name} | ${icon} | ${r.cardCount} | ${r.contentLoadedCount} | ${r.demoBadgeCount} | ${r.consoleErrors.length + r.pageErrors.length} | ${r.details} |\n`;
              }

              if (failedDashboards.length > 0) {
                details += `\n## Failed Dashboards\n\n`;
                for (const r of failedDashboards) {
                  details += `### ${r.name} (\`${r.path}\`)\n\n`;
                  if (r.pageErrors.length > 0) {
                    details += `**Unhandled Exceptions:**\n`;
                    for (const e of r.pageErrors) {
                      details += `- \`${e.substring(0, 200)}\`\n`;
                    }
                  }
                  if (r.consoleErrors.length > 0) {
                    details += `**Console Errors:**\n`;
                    for (const e of r.consoleErrors.slice(0, 5)) {
                      details += `- \`${e.substring(0, 200)}\`\n`;
                    }
                    if (r.consoleErrors.length > 5) {
                      details += `- ... and ${r.consoleErrors.length - 5} more\n`;
                    }
                  }
                  if (!r.hasContent) {
                    details += `**Page appears blank** (no meaningful text content)\n`;
                  }
                  details += '\n';
                }
              }
            } else {
              details = 'Test output could not be parsed. See the workflow run for details.';
            }

            const failCount = failedDashboards.length;
            const warnCount = warnedDashboards.length;
            const total = report ? report.total : '?';

            const title = `[Nightly Health] ${failCount} dashboard(s) failing (${now})`;

            const body = [
              `## Nightly Dashboard Health Check — ${now}`,
              '',
              `**Commit:** \`${sha}\``,
              `**Run:** [View workflow](${runUrl})`,
              `**Total:** ${total} dashboards | **Failed:** ${failCount} | **Warnings:** ${warnCount}`,
              '',
              details,
              '',
              '## Fix Guidance',
              '',
              '1. Check the failed dashboard routes locally: `npm run dev` → navigate to the failing path',
              '2. Open browser DevTools console to see the error',
              '3. Common fixes:',
              '   - **Unhandled exceptions**: Check for undefined data in hooks (guard with `|| []`)',
              '   - **Blank pages**: Check lazy loading / Suspense boundaries',
              '   - **Console errors**: Check API call error handling',
              '',
              '## Reproduction',
              '',
              '```bash',
              'cd web',
              'npx playwright test e2e/nightly/dashboard-health.spec.ts -c e2e/nightly/nightly.config.ts --headed',
              '```',
            ].join('\n');

            // Check for duplicate open issues
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-qa,nightly-health',
              per_page: 10,
            });

            // Close stale nightly health issues (older than 3 days)
            const threeDaysAgo = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000);
            for (const existing of openIssues) {
              if (new Date(existing.created_at) < threeDaysAgo) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
                core.info(`Closed stale issue #${existing.number}`);
              }
            }

            // Skip if a recent issue already exists for the same failure pattern
            const recentDuplicate = openIssues.find(i => {
              const created = new Date(i.created_at);
              return created > threeDaysAgo && i.title.includes('dashboard(s) failing');
            });

            if (recentDuplicate) {
              // Update the existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recentDuplicate.number,
                body: `## Updated: ${now}\n\n${details}\n\n**Run:** [View workflow](${runUrl})`,
              });
              core.info(`Updated existing issue #${recentDuplicate.number} with latest results`);
              return;
            }

            // Create new issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'auto-qa', 'nightly-health', 'help wanted', 'triage/accepted'],
            });

            core.info(`Created issue #${issue.number}: ${title}`);

            // Assign Copilot coding agent
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: repo,
                  base_branch: 'main',
                },
              });
              core.info(`Assigned Copilot to #${issue.number}`);
            } catch (e) {
              const hint = e.status === 401
                ? ' — CONSOLE_AUTO PAT may be expired (check repo secrets)'
                : e.status === 403
                ? ' — token may lack repo scope or Copilot agent is not enabled'
                : '';
              core.warning(`Could not assign Copilot to #${issue.number}: ${e.message}${hint}`);
            }
