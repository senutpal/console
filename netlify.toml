# Netlify configuration for KubeStellar Console
# Enables PR preview deployments with mock data (no backend required)

[build]
  # Frontend is in web/ subdirectory
  base = "web"
  # Skip the tsc type-check step on Netlify — TypeScript 6 needs ~3 GB heap
  # which exceeds the default Node allocation in Netlify build containers,
  # causing OOM crashes during `tsc -b`. Type checking is already enforced
  # by CI (build workflow) and local `npm run build`. Vite compiles TS
  # directly via esbuild, so the runtime bundle is unaffected.
  command = "npm ci && npx vite build && node scripts/check-vendor-safety.mjs"
  publish = "dist"

[functions]
  # Netlify Functions directory (relative to base)
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Edge Functions — inject SEO meta tags, serve robots.txt + sitemap.xml
# These only run on Netlify, not on localhost or cluster deployments
[[edge_functions]]
  path = "/*"
  function = "seo-meta"

[[edge_functions]]
  path = "/robots.txt"
  function = "robots"

[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[build.environment]
  # Enable demo mode with mock data for Netlify previews
  VITE_DEMO_MODE = "true"
  NODE_VERSION = "20"
  # Raise the V8 heap ceiling so esbuild function bundling (33 functions,
  # including the 30 MB googleapis tree) does not OOM.
  NODE_OPTIONS = "--max_old_space_size=4096"

# GitHub avatar proxy — avatars.githubusercontent.com is blocked by browser
# when loaded inside SVG foreignObject. Proxy through our domain to avoid CORS.
[[redirects]]
  from = "/api/avatar/:id"
  to = "https://avatars.githubusercontent.com/u/:id?s=40&v=4"
  status = 200
  force = true

# CNCF artwork proxy — official project icons from the cncf/artwork repo
[[redirects]]
  from = "/api/cncf-icon/:project"
  to = "https://raw.githubusercontent.com/cncf/artwork/master/projects/:project/icon/color/:project-icon-color.png"
  status = 200
  force = true

# Nightly E2E status API — proxy to Netlify Function
# Serves live GitHub Actions data (GITHUB_TOKEN set in Netlify dashboard)
[[redirects]]
  from = "/api/nightly-e2e/runs"
  to = "/.netlify/functions/nightly-e2e"
  status = 200

[[redirects]]
  from = "/api/public/nightly-e2e/runs"
  to = "/.netlify/functions/nightly-e2e"
  status = 200

# Presence tracking API — proxy to Netlify Function
[[redirects]]
  from = "/api/active-users"
  to = "/.netlify/functions/presence"
  status = 200

# Feedback App attribution proxy — creates issues via the
# kubestellar-console-bot GitHub App. Holds the App private key in
# Netlify env; consumer consoles (localhost + cluster) POST here with
# a per-user client credential so GitHub stamps
# performed_via_github_app.slug on every console-submitted issue.
[[redirects]]
  from = "/api/feedback-app"
  to = "/.netlify/functions/feedback-app"
  status = 200

