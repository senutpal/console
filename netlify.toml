# Netlify configuration for KubeStellar Console
# Enables PR preview deployments with mock data (no backend required)

[build]
  # Frontend is in web/ subdirectory
  base = "web"
  command = "npm ci && npm run build"
  publish = "dist"

[functions]
  # Netlify Functions directory (relative to base)
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Edge Functions — inject SEO meta tags, serve robots.txt + sitemap.xml
# These only run on Netlify, not on localhost or cluster deployments
[[edge_functions]]
  path = "/*"
  function = "seo-meta"

[[edge_functions]]
  path = "/robots.txt"
  function = "robots"

[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[build.environment]
  # Enable demo mode with mock data for Netlify previews
  VITE_DEMO_MODE = "true"
  NODE_VERSION = "20"

# GitHub avatar proxy — avatars.githubusercontent.com is blocked by browser
# when loaded inside SVG foreignObject. Proxy through our domain to avoid CORS.
[[redirects]]
  from = "/api/avatar/:id"
  to = "https://avatars.githubusercontent.com/u/:id?s=40&v=4"
  status = 200
  force = true

# CNCF artwork proxy — official project icons from the cncf/artwork repo
[[redirects]]
  from = "/api/cncf-icon/:project"
  to = "https://raw.githubusercontent.com/cncf/artwork/master/projects/:project/icon/color/:project-icon-color.png"
  status = 200
  force = true

# Nightly E2E status API — proxy to Netlify Function
# Serves live GitHub Actions data (GITHUB_TOKEN set in Netlify dashboard)
[[redirects]]
  from = "/api/nightly-e2e/runs"
  to = "/.netlify/functions/nightly-e2e"
  status = 200

[[redirects]]
  from = "/api/public/nightly-e2e/runs"
  to = "/.netlify/functions/nightly-e2e"
  status = 200

# Presence tracking API — proxy to Netlify Function
[[redirects]]
  from = "/api/active-users"
  to = "/.netlify/functions/presence"
  status = 200

# Missions API — proxy to Netlify Function (console-kb knowledge base)
[[redirects]]
  from = "/api/missions/file"
  to = "/.netlify/functions/missions-file"
  status = 200

[[redirects]]
  from = "/api/missions/browse"
  to = "/.netlify/functions/missions-browse"
  status = 200

# GA4 gtag.js proxy — Netlify Function serves gtag.js from same origin,
# bypassing domain-based ad blockers. This is the Netlify equivalent of
# the Go backend's GA4ScriptProxy. Route handled by gtag-proxy.mts via
# Config.path, so no redirect needed here.

# GA4 event collection — custom lightweight tracker sends directly to /api/m
# (Netlify Function via Config.path, no gtag.js loaded)

# Analytics dashboard API — proxy to Netlify Function
# Serves live GA4 Data API data (GA4_SERVICE_ACCOUNT_JSON + GA4_PROPERTY_ID in Netlify dashboard)
[[redirects]]
  from = "/api/analytics-dashboard"
  to = "/.netlify/functions/analytics-dashboard"
  status = 200

# YouTube playlist API — proxy to Netlify Function
[[redirects]]
  from = "/api/youtube/playlist"
  to = "/.netlify/functions/youtube-playlist"
  status = 200

# Medium blog API — proxy to Netlify Function
[[redirects]]
  from = "/api/medium/blog"
  to = "/.netlify/functions/medium-blog"
  status = 200

# YouTube thumbnail proxy — serves thumbnails through our origin to avoid MSW blocking
[[redirects]]
  from = "/api/youtube/thumbnail/*"
  to = "/.netlify/functions/youtube-thumbnail"
  status = 200

# Analytics dashboard page — serve static HTML
[[redirects]]
  from = "/analytics"
  to = "/analytics.html"
  status = 200

# Issue Activity Stats API — proxy to Netlify Function
# Daily issue opened/closed + PRs merged chart data (GITHUB_TOKEN in Netlify dashboard)
[[redirects]]
  from = "/api/issue-stats"
  to = "/.netlify/functions/issue-stats"
  status = 200

# SPA routing - redirect all routes to index.html (only if file doesn't exist)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for security and caching.
# Cache-Control: no-cache, no-store is set here for all routes so that SPA paths like
# /clusters (served as index.html via the /* rewrite) are always refetched fresh
# after a deploy. Netlify matches headers against the request path, not the
# served file, so the /*.html rule below does NOT cover /clusters etc.
# The /assets/* rule (below) overrides this with immutable for hashed bundles.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    # Content Security Policy
    #
    # Hardened per OWASP ZAP findings (issue #5971):
    #   - Removed script-src 'unsafe-inline' — the one inline <script> in
    #     index.html was moved to /secure-context-check.js.
    #   - Removed host wildcards (https://*.google-analytics.com etc.) in
    #     favor of explicit subdomain allowlists.
    #   - Removed scheme-only wss: wildcard; same-origin WebSockets are
    #     already covered by 'self' under CSP Level 3.
    #   - Removed ws://localhost:* — the local agent WebSocket is a dev-only
    #     feature and never successfully connects from console.kubestellar.io.
    #
    # Retained unsafe directives (cannot be removed without breaking features):
    #   - script-src 'unsafe-eval' — required by the Tier 2 dynamic cards
    #     feature, which compiles user-authored card modules at runtime via
    #     `new Function()` in web/src/lib/dynamic-cards/compiler.ts. Removing
    #     this would disable the dynamic card factory entirely.
    #   - style-src 'unsafe-inline' — React renders `style={{}}` props as
    #     `style="..."` HTML attributes, which are blocked under strict CSP
    #     without 'unsafe-inline'. Tailwind and our app-shell <style> block
    #     also rely on inline styles. Removing this would require rewriting
    #     every inline style across the entire component tree.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' https://www.googletagmanager.com https://analytics.kubestellar.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://github.com https://avatars.githubusercontent.com https://raw.githubusercontent.com https://api.dicebear.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com https://fonts.googleapis.com https://www.googleapis.com https://www.googletagmanager.com https://api.github.com https://api.dicebear.com https://fonts.gstatic.com https://analytics.kubestellar.io https://raw.githubusercontent.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; worker-src 'self' blob:; manifest-src 'self'"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Versioned JS/CSS assets have content-hashed filenames — safe to cache forever.
# Netlify uses the most specific matching path, so /assets/* takes precedence over /*.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files must always revalidate to pick up new chunk references after deploys
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Context-specific settings
[context.production]
  # Production builds (main branch) - still use demo mode for now
  [context.production.environment]
    VITE_DEMO_MODE = "true"

[context.deploy-preview]
  # PR preview deployments - always use demo mode
  [context.deploy-preview.environment]
    VITE_DEMO_MODE = "true"

[context.branch-deploy]
  # Branch deploys - use demo mode
  [context.branch-deploy.environment]
    VITE_DEMO_MODE = "true"
